<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .nebula-glow {
            background: radial-gradient(circle at center, rgba(109, 40, 217, 0.15) 0%, transparent 70%);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col items-center overflow-hidden">
<header class="w-full top-0 sticky bg-[#11131d]/60 backdrop-blur-xl flex justify-between items-center px-6 py-4 w-full shadow-[0_0_20px_rgba(211,187,255,0.08)] z-50">
<div class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-br from-[#d3bbff] to-[#6d28d9] font-['Plus_Jakarta_Sans'] tracking-tight">
            CosmoQuiz
        </div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#d3bbff] text-3xl hover:scale-105 transition-transform duration-200 active:scale-95 transition-all">account_circle</span>
</div>
</header>
<main class="flex-1 w-full max-w-4xl px-6 flex flex-col items-center justify-center relative">
<div class="absolute inset-0 nebula-glow -z-10"></div>
<div class="relative mb-8 mt-4">
<div class="absolute -top-12 -left-12 w-24 h-24 bg-secondary-container/20 rounded-full blur-2xl"></div>
<div class="absolute -bottom-8 -right-8 w-32 h-32 bg-primary-container/20 rounded-full blur-2xl"></div>
<div class="relative z-10 w-64 h-64 md:w-80 md:h-80 flex items-center justify-center bg-surface-container-high rounded-full border-4 border-primary/20 shadow-2xl">
<img class="w-48 h-48 md:w-60 md:h-60 object-contain drop-shadow-[0_0_30px_rgba(255,219,60,0.4)]" data-alt="a cute cartoon rocket ship blasting off into a dark blue space background with colorful stars and purple nebula clouds" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCUA1CNueq9blQMpWKNEXs1DVPMwF2DuMfjTEcj7iNoLcdJOcqKiKDuKRbyaVRs8EvyJN6BYKi3CuEhtD_541jP4a4CvER9x-g--f0KncOQcNS7JXBbYmtOaDC9jQe6xjPznm9y2oXmQ4tOQZiYfOrbxFQ-eBOD-UeFftyUBxOSKP5_5aoEMoVyiO-W6Gsh7eKJY9EerdsWli0yZVIylB8hbeuET16KJUoz6RdLQXTD_MvcTeAWOQiQoRyYmOMdwmdFe8Xzb74jPuE"/>
</div>
</div>
<div class="text-center space-y-4 mb-12">
<h1 class="text-4xl md:text-6xl font-black text-secondary tracking-tight">
                You are a Space Hero!
            </h1>
<div class="inline-flex items-center gap-3 bg-surface-container-highest px-8 py-4 rounded-xl border-2 border-outline-variant/10 shadow-lg">
<span class="material-symbols-outlined text-secondary-container text-4xl" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="text-3xl md:text-5xl font-extrabold text-on-surface">5/5 Stars!</span>
</div>
</div>
<div class="w-full max-w-xs px-4">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary-container text-2xl font-black py-6 rounded-xl shadow-[0_0_40px_rgba(109,40,217,0.3)] hover:scale-105 transition-all active:scale-95 flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-3xl">play_circle</span>
                Play Again
            </button>
</div>
<div class="mt-12 flex gap-4 opacity-40">
<span class="material-symbols-outlined text-secondary text-xl">auto_awesome</span>
<span class="material-symbols-outlined text-primary text-xl">brightness_high</span>
<span class="material-symbols-outlined text-secondary-container text-xl">circle_notifications</span>
</div>
</main>
<div class="fixed top-24 left-10 opacity-20 pointer-events-none">
<span class="material-symbols-outlined text-6xl text-secondary">star_border</span>
</div>
<div class="fixed bottom-20 right-10 opacity-10 pointer-events-none">
<span class="material-symbols-outlined text-8xl text-primary">rocket</span>
</div>
<div class="fixed top-1/2 right-20 opacity-20 pointer-events-none">
<span class="material-symbols-outlined text-4xl text-secondary-container" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
