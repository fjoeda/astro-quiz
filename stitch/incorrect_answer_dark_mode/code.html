<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(40, 41, 52, 0.6);
            backdrop-filter: blur(20px);
        }
        .star-bg {
            background-image: radial-gradient(circle at 2px 2px, rgba(211, 187, 255, 0.15) 1px, transparent 0);
            background-size: 40px 40px;

<body class="bg-background font-body text-on-surface overflow-hidden min-h-screen flex flex-col">
<header class="bg-[#11131d]/60 backdrop-blur-xl shadow-[0_0_20px_rgba(211,187,255,0.08)] flex justify-between items-center w-full px-6 py-4 z-50">
<div class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-br from-[#d3bbff] to-[#6d28d9] font-['Plus_Jakarta_Sans'] tracking-tight">
            CosmoQuiz
        </div>
<div class="flex items-center gap-4">
<button class="hover:scale-105 hover:shadow-[0_0_15px_#6d28d9] transition-all active:scale-95 duration-200 p-2 rounded-full">
<span class="material-symbols-outlined text-[#d3bbff]">account_circle</span>
</button>
</div>
</header>
<main class="flex-grow flex items-center justify-center relative star-bg px-6 py-12">
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary-container/20 rounded-full blur-[100px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-tertiary-container/10 rounded-full blur-[80px]"></div>
</div>
<div class="relative w-full max-w-md">
<div class="glass-panel rounded-lg p-8 text-center border border-white/5 shadow-2xl relative overflow-visible">
<div class="absolute -top-24 left-1/2 -translate-x-1/2 w-48 h-48 drop-shadow-[0_0_30px_rgba(255,219,60,0.2)]">
<img alt="Sad Robot" class="w-full h-full object-contain" data-alt="A cute, chunky cartoon robot with a large glowing blue question mark on its chest screen, looking slightly sad with tilted head in a deep space setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDwFBMMnRFFEIz1bIZWNVX6UKSnv6pHg6e93aUJon0tJCNoK0EgXf2cPkx3faAGX5Zj4GPGuf-lES2LWamByrKk09r2s4fG_O3hgyERrE20OD8RYzQa-yR-LLwOKI5GCIKq9hl5eO6JeZTvI1JCDA7PyHjnDf8EIKlkv5WiOEj7OgBG_YrINtmAwPMOCY1OSSzvfqRIJ9OX94facjcn7G3C8FgnVq0bh-pGt5s11PX41hmz3PaG4gVc-vPJd1mtDwh4YUjaR27uxNQ"/>
</div>
<div class="mt-20 mb-8">
<h1 class="text-3xl font-extrabold text-secondary tracking-tight mb-3">Oops! Not quite right.</h1>
<p class="text-on-surface-variant text-lg font-medium">Give it another orbit!</p>
</div>
<div class="space-y-4 mb-8">
<div class="bg-surface-container-low rounded-lg p-5 border border-white/5 text-left flex items-start gap-4">
<div class="p-2 bg-error/20 rounded-full mt-1">
<span class="material-symbols-outlined text-error text-xl">close</span>
</div>
<div>
<p class="text-sm text-on-surface-variant uppercase tracking-wider font-bold mb-1">Your Answer</p>
<p class="text-on-surface text-lg">The Sun is made of cheese</p>
</div>
</div>
<div class="bg-surface-container-high/40 rounded-lg p-4 flex items-center gap-3">
<span class="material-symbols-outlined text-secondary-container">tips_and_updates</span>
<p class="text-sm text-on-surface/80 italic">Hint: Stars are mostly made of Hydrogen and Helium gas!</p>
</div>
</div>
<div class="flex flex-col gap-4">
<button class="w-full py-5 rounded-xl bg-gradient-to-br from-[#d3bbff] to-[#6d28d9] text-primary-container font-extrabold text-xl shadow-[0_10px_25px_rgba(109,40,217,0.4)] hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined font-bold">replay</span>
                        Try Again
                    </button>
<button class="w-full py-4 rounded-xl text-primary font-bold hover:bg-white/5 transition-colors">
                        Review Lesson
                    </button>
</div>
</div>
<div class="mt-12 flex justify-center gap-8 text-on-surface/40">
<div class="flex flex-col items-center">
<div class="w-12 h-12 rounded-full border-2 border-dashed border-outline-variant flex items-center justify-center mb-2">
<span class="material-symbols-outlined">star</span>
</div>
<span class="text-xs font-bold tracking-widest uppercase">3/5 Left</span>
</div>
<div class="flex flex-col items-center">
<div class="w-12 h-12 rounded-full border-2 border-dashed border-outline-variant flex items-center justify-center mb-2">
<span class="material-symbols-outlined">timer</span>
</div>
<span class="text-xs font-bold tracking-widest uppercase">04:22</span>
</div>
</div>
</div>
</main>
<footer class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 bg-[#11131d]/60 backdrop-blur-xl tonal-shift bg-[#0c0e18] shadow-[0_-10px_40px_rgba(109,40,217,0.2)] rounded-t-[3rem]">
<div class="flex flex-col items-center justify-center text-[#d3bbff] p-3 hover:bg-[#282934] rounded-full transition-colors active:scale-90 duration-300">
<span class="material-symbols-outlined">star</span>
<span class="font-['Plus_Jakarta_Sans'] text-xs font-bold uppercase tracking-widest mt-1">Stars</span>
</div>
<div class="flex flex-col items-center justify-center bg-gradient-to-br from-[#d3bbff] to-[#6d28d9] text-[#11131d] rounded-full p-3 shadow-[0_0_20px_#d3bbff] active:scale-90 duration-300">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
<span class="font-['Plus_Jakarta_Sans'] text-xs font-bold uppercase tracking-widest mt-1">Badges</span>
</div>
<div class="flex flex-col items-center justify-center text-[#d3bbff] p-3 hover:bg-[#282934] rounded-full transition-colors active:scale-90 duration-300">
<span class="material-symbols-outlined">map</span>
<span class="font-['Plus_Jakarta_Sans'] text-xs font-bold uppercase tracking-widest mt-1">Map</span>
</div>
</footer>
